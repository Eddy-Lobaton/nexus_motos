{% extends 'tienda/base_tres.html'%}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'tienda/css/agregar_proveedor_estilos.css' %}">
{% endblock %} 

{% block content %}
<div class="container mt-4">
    <h2 class="text-primary">Venta</h2>
    <h4>Agregar cliente</h4>
    <hr class="border-primary">

    <form enctype="multipart/form-data">
        <div class="row">
            <div class="col-md-6">
                <label>Tipo de documento</label>
                <input type="text" class="form-control mb-2">
                <label>Nombre</label>
                <input type="number" class="form-control mb-2">
                <label>Apellido materno</label>
                <input type="number" class="form-control mb-2">
                <label>Apellido email</label>
                <input type="number" class="form-control mb-2">
                <label>Dirección</label>
                <input type="number" class="form-control mb-2">
            </div>
            <div class="col-md-6">
                <label>Número de documento</label>
                <input type="text" class="form-control mb-2">
                <label>Apellido paterno</label>
                <input type="text" class="form-control mb-2">
                <label>Teléfono</label>
                <input type="text" class="form-control mb-2">
                <label>Sexo</label>
                <input type="text" class="form-control mb-2">
            </div>
        </div>

        <div class="mt-3 d-flex justify-content-center gap-2">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="#" class="btn btn-danger">Cancelar</a>
        </div>
    </form>
</div>




<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
{% endblock%}

{% block extra_js %}
<script src="{% static 'tienda/js/agregar_articulo.js' %}"></script>
{% endblock %}
