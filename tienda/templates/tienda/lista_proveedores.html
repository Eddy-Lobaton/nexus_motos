{% extends 'tienda/base_tres.html'%} 
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'tienda/css/proveedores_estilos.css' %}" />
{% endblock %}

{% block content %}

<div class="card">
    <div class="card-body">
        <!-- Título y Botones -->
        <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="card-title mb-0">Proveedores</h5>
        <div>
            <button class="btn btn-primary btn-sm me-2">
                <a href="{% url 'agregar_proveedor' %}" class="btn-add">Agregar</a>
            </button>
            <button class="btn btn-success btn-sm">Reporte</button>
        </div>
        </div>

        <!-- Tabla -->
        <div class="table-responsive d-flex justify-content-center">
        <table class="table table-fixed align-middle">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>RUC</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th>Email</th>
                <th>Editar</th>
            </tr>
            </thead>
            <tbody id="table-body">
            <!-- Aquí más filas dinámicas -->
            </tbody>
        </table>
        </div>

        <!-- Paginación -->
        <nav aria-label="Page navigation example">
        <ul class="pagination justify-content-center mt-4" id="pagination">
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <!-- Aquí también lo generarás dinámicamente -->
        </ul>
        </nav>
    </div>
</div>

{% endblock%} {% block extra_js %}
<script src="{% static 'tienda/js/lista_proveedores.js' %}"></script>
{% endblock %}
